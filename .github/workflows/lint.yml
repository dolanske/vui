name: Lint
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
# Opt the bundled JavaScript actions (checkout, setup-node, etc.) into the
# Node.js 24 runtime ahead of it becoming the GitHub Actions default, which
# silences the Node.js 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Lint library
        run: npm run lint
      - name: Install docs dependencies
        run: cd docs && npm install
      - name: Lint docs
        run: cd docs && npm run lint
